name: practical_cubit
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.1

dependencies:
 # State Management
  flutter_bloc: ^8.1.3
  dotted_border: ^2.1.0
  country_picker: ^2.0.26

  # HTTP Client
  dio: ^5.3.2
  retrofit: ^4.9.2

  # Dependency Injection
  get_it: ^7.6.4

  # Local Storage (for token)
  shared_preferences: ^2.2.1

  # Equatable (for state comparison)
  equatable: ^2.0.5

  # Functional Either (forgot-password flow)
  dartz: ^0.10.1
  
  flutter:
    sdk: flutter
  go_router: ^17.2.3


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.14.1


flutter:
  uses-material-design: true

  assets:
    - assets/images/
